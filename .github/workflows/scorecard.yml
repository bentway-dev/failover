name: Scorecard

# OpenSSF Scorecard — periodic supply-chain health check. Publishes a
# SARIF report consumed by the Scorecard badge and (when the repo opts
# in) the public scorecard.dev dashboard.

on:
  # Weekly cadence + on push to main so the badge reflects recent
  # tightening promptly.
  schedule:
    - cron: '17 4 * * 1'
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the SARIF results to GitHub's code-scanning UI.
      security-events: write
      # Needed for the Scorecard action to publish results to the
      # OpenSSF public dashboard (cryptographic attestation).
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          sarif_file: results.sarif
