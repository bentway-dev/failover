name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # The org-specific hygiene supplement is only available on trusted pushes
      # (the secret isn't exposed to fork PRs). HYGIENE_REQUIRE_LOCAL gates
      # the gate's strict-fail behavior; see scripts/check-comment-hygiene.mjs.
      HYGIENE_LOCAL_RULES: ${{ secrets.HYGIENE_LOCAL_RULES }}
      HYGIENE_REQUIRE_LOCAL: ${{ github.event_name == 'push' && '1' || '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          # v5 turns on auto-caching when package.json has `packageManager`,
          # but pnpm isn't on PATH yet (corepack runs below) → cache step
          # fails. Disable to match v4's behavior; revisit when restructuring
          # the workflow to install pnpm before setup-node.
          package-manager-cache: false
      - run: corepack enable
      - run: corepack prepare pnpm@11.5.1 --activate
      - run: pnpm install --frozen-lockfile
      - name: Materialize hygiene supplement (when available)
        run: |
          if [ -n "$HYGIENE_LOCAL_RULES" ]; then
            printf "%s" "$HYGIENE_LOCAL_RULES" > .hygiene-local.mjs
            echo "supplement materialized from secret"
          else
            echo "no hygiene supplement available (fork PR) — generic-only"
          fi
      - run: pnpm build
      - run: pnpm test
      # lint:pkg runs publint + @arethetypeswrong/cli against the built
      # package — catches exports-map and types-resolution regressions that
      # would otherwise ship silently. Runs AFTER build so dist/ is present.
      - run: pnpm lint:pkg
